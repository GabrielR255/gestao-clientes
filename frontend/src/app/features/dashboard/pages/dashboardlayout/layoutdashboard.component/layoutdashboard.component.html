<div class="min-h-screen bg-gray-100 flex flex-col">
  
  <app-sidebar-nav class="w-full shrink-0"></app-sidebar-nav>

  <main class="flex-1 p-4 md:p-10">
    
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-7xl mx-auto px-2 mb-10">
      
      @for (item of listacomponent(); let i = $index; track item.title) {
        <div
          class="flex items-center gap-4 rounded-xl p-5 text-white shadow-md transition-all"
          [class.bg-blue-600]="i === 0"
          [class.bg-green-700]="i === 1"
          [class.bg-orange-500]="i === 2"
        >
          <img [src]="item.icon" class="h-10 w-10 shrink-0" />

          <div class="flex flex-col">
            <span class="text-[17px] opacity-90 font-semibold leading-tight">
              {{ item.title }}
            </span>

            <div class="flex gap-2 items-baseline">
              <span class="text-2xl md:text-3xl font-bold">
                {{ item.number }}
              </span>
              <span class="text-sm opacity-70 font-semibold">
                {{ item.subtitle }}
              </span>
            </div>
          </div>
        </div>
      }
    </div>

    <div class="max-w-7xl mx-auto bg-white p-4 md:p-6 rounded-xl shadow-sm">
      <app-chart></app-chart>
    </div>

  </main>
</div>
