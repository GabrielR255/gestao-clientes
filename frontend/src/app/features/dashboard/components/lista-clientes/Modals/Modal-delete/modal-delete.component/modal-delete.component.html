@if(visibleDelete){

<div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
  
  <main class="w-full max-w-lg h-48 bg-white rounded-xl shadow-2xl ">
    
    <div class="bg-[#25324F] px-6 py-4 border-b border-gray-100 flex justify-between items-center">
      <h2 class="text-xl font-semibold text-white">Deletar cliente</h2>
      <button type="button" (click)="cancelardelete()" class="text-white cursor-pointer">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <div class="p-4 flex flex-col gap-6">
    
      <div class="flex-1">
        <h3 class="text-xl font-semibold text-gray-800 mb-2">Deseja mesmo deletar?</h3>

    </div>



    </div>

    <div class="px-6 py-6 bg-white border-t border-gray-50 flex justify-end gap-3 mt-[-40px]">
      <button (click)="cancelardelete()" class="p-2.5 rounded-lg border border-gray-200 text-gray-700 font-semibold hover:bg-gray-50 transition-all cursor-pointer">
Cancelar
    </button>
      
      <button (click)="confirmdelete()" class="p-2.5  rounded-lg bg-red-600 text-white font-semibold shadow-lg cursor-pointer">
Deletar 
    </button>
    </div>

  </main>
</div>

}
