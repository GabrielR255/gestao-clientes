@if(visibleEdit){

<div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
  
  <main class="w-full max-w-lg bg-white rounded-xl shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-300">
    
    <!-- HEADER -->
    <div class="bg-[#25324F] px-6 py-4 border-b border-gray-100 flex justify-between items-center">
      <h2 class="text-xl font-bold text-white">Editar dados</h2>

      <button type="button" (click)="cancelar()" class="text-white">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <form [formGroup]="clientedit" (ngSubmit)="submit($event)">
      
      <div class="p-8 flex flex-col gap-6">

        <div>
          <h3 class="text-2xl font-bold text-gray-800 mb-2">Realizar alteração</h3>
          <p class="text-gray-500">
            Para realizar a alteração, selecione o campo abaixo:
          </p>
        </div>

        <!-- STATUS -->
        <div class="relative border-b-2 border-gray-200 focus-within:border-cyan-400 transition-all">
          <label class="text-gray-500 text-xs font-semibold uppercase">
            Status do Cliente
          </label>
          
          <select 
            formControlName="status"
            class="w-full py-2 text-sm text-black outline-none bg-transparent appearance-none cursor-pointer"
          >
            <option value="" disabled>Selecione o status</option>
            <option value="ativo">Ativo</option>
            <option value="pendente">Pendente</option>
            <option value="inativo">Inativo</option>
          </select>

          @if (clientedit.controls['status']?.touched && clientedit.controls['status']?.invalid) {
            <span class="text-[10px] text-red-500 absolute -bottom-4 left-0">
              Selecione uma opção
            </span>
          }
        </div>

      </div>

      <!-- FOOTER -->
      <div class="px-6 py-6 bg-white border-t border-gray-50 flex justify-end gap-3">
        
        <button 
          type="button"
          (click)="cancelar()"
          class="px-6 py-2.5 rounded-lg border border-gray-200 text-gray-700 font-semibold hover:bg-gray-50 transition-all cursor-pointer">
          Cancelar
        </button>
        
        <button
          type="submit"
          [disabled]="clientedit.invalid"
          class="bg-[#25324f] text-white font-bold py-3 px-6 rounded shadow-lg 
                 hover:opacity-90 transition-all uppercase tracking-widest text-sm 
                 disabled:opacity-60 disabled:cursor-not-allowed cursor-pointer">
          Alterar dados
        </button>

      </div>

    </form>

  </main>
</div>


}
